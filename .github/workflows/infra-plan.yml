name: terraform-plan

on:
  pull_request:
    paths:
      - "aws/**/*.tf"
      - "aws/**/*.tfvars"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    if: ${{ hashFiles('aws/**/*.tf') != '' && vars.AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -no-color -input=false | tee plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: aws/plan.txt

      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('aws/plan.txt','utf8');
            const body = `### Terraform Plan (aws)\n\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
